name: Build DinoFinder Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Clone ArkApi (OxygenMod)
      run: |
        git clone --depth 1 https://github.com/OxygenMod/Oxygen.git ArkApi

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DARKAPI_PATH="${{ github.workspace }}/ArkApi"

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Windows DLL
      uses: actions/upload-artifact@v4
      with:
        name: DinoFinder-Windows
        path: build/bin/DinoFinder.dll
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake g++ make

    - name: Clone ArkApi (OxygenMod)
      run: |
        git clone --depth 1 https://github.com/OxygenMod/Oxygen.git ArkApi

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DARKAPI_PATH="${{ github.workspace }}/ArkApi"

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Linux SO
      uses: actions/upload-artifact@v4
      with:
        name: DinoFinder-Linux
        path: build/bin/libDinoFinder.so
        retention-days: 30
