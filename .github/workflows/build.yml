name: Build DinoFinder Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Clone ArkApi
      run: |
        git clone https://github.com/ArkApi/ArkApi.git ../ArkApi
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Upload Windows DLL
      uses: actions/upload-artifact@v3
      with:
        name: DinoFinder-Windows
        path: build/bin/DinoFinder.dll
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ make
    
    - name: Clone ArkApi
      run: |
        git clone https://github.com/ArkApi/ArkApi.git ../ArkApi
    
    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Upload Linux SO
      uses: actions/upload-artifact@v3
      with:
        name: DinoFinder-Linux
        path: build/bin/libDinoFinder.so
        retention-days: 30

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: DinoFinder-Windows
        path: ./windows
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v3
      with:
        name: DinoFinder-Linux
        path: ./linux
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows/DinoFinder.dll
          linux/libDinoFinder.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
