name: Build DinoFinder Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: DinoFinder

    - uses: actions/checkout@v4
      with:
        repository: ArkApi/ArkApi
        path: ArkApi
        fetch-depth: 1

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build ArkApi
      working-directory: ArkApi
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Configure DinoFinder
      run: cmake -B DinoFinder/build -S DinoFinder -DCMAKE_BUILD_TYPE=Release -DARKAPI_PATH="${{ github.workspace }}/ArkApi"

    - name: Build DinoFinder
      run: cmake --build DinoFinder/build --config Release

    - name: Upload Windows DLL
      uses: actions/upload-artifact@v4
      with:
        name: DinoFinder-Windows
        path: DinoFinder/build/bin/DinoFinder.dll
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: DinoFinder

    - uses: actions/checkout@v4
      with:
        repository: ArkApi/ArkApi
        path: ArkApi
        fetch-depth: 1

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake g++ make

    - name: Build ArkApi
      working-directory: ArkApi
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Configure DinoFinder
      run: cmake -B DinoFinder/build -S DinoFinder -DCMAKE_BUILD_TYPE=Release -DARKAPI_PATH="${{ github.workspace }}/ArkApi"

    - name: Build DinoFinder
      run: cmake --build DinoFinder/build --config Release

    - name: Upload Linux SO
      uses: actions/upload-artifact@v4
      with:
        name: DinoFinder-Linux
        path: DinoFinder/build/bin/libDinoFinder.so
        retention-days: 30
