name: Build DinoFinder Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Clone ArkAPI
      run: |
        git clone https://github.com/ArkApi/ArkApi.git ../ArkApi
        
    - name: Configure CMake
      run: cmake -B build -S . -DBUILD_64BIT=ON
      
    - name: Build
      run: cmake --build build --config Release
      
    - name: Upload DLL
      uses: actions/upload-artifact@v3
      with:
        name: DinoFinder-Windows
        path: build/DinoFinder.dll
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make
        
    - name: Clone ArkAPI
      run: |
        git clone https://github.com/ArkApi/ArkApi.git ../ArkApi
        
    - name: Configure CMake
      run: cmake -B build -S . -DBUILD_64BIT=ON
      
    - name: Build
      run: cmake --build build --config Release
      
    - name: Upload SO
      uses: actions/upload-artifact@v3
      with:
        name: DinoFinder-Linux
        path: build/DinoFinder.so
        retention-days: 30

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: DinoFinder-Windows
        path: ./artifacts/windows
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v3
      with:
        name: DinoFinder-Linux
        path: ./artifacts/linux
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/windows/DinoFinder.dll
          artifacts/linux/DinoFinder.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
